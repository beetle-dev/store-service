server:
  port: 8080

spring:
  config:
    import:
      - "aws-secretsmanager:prd/cafe"
      - "aws-secretsmanager:rds!cluster-cb0cfbce-010d-4b94-98dc-9bfc73234f43"

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${username}
    password: ${password}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      ssl:
        enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET}
    kms:
      key-arn: ${S3_KEY_ARN}
    region:
      static: ${S3_REGION}
    directory:
      menu: ${S3_DIRECTORY}

gateway:
  secret: ${GATEWAY_SECRET}

simulation:
  enabled: true
  orders-per-store-min: 15
  orders-per-store-max: 40

logging:
  level:
    root: INFO                          # 전체 기본
    org.springframework.web: DEBUG      # 웹 요청/응답
    org.springframework.web.servlet.DispatcherServlet: DEBUG  # 요청 라우팅
    com.zaxxer.hikari: DEBUG   # DB 커넥션 풀 (DB 연결 실패 확인용)